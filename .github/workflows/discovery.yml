name: Box Office Discovery Engine

on:
  schedule:
    # Run daily at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover-movies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Movie Discovery
        env:
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
        run: npm run discovery

      - name: Run Venue Discovery
        run: npx tsx src/discovery/map-venues.ts

      - name: Commit and Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies.json data/bms_venues.json
          git commit -m "chore(data): auto-update movies and venues list [skip ci]" || exit 0
          git push
